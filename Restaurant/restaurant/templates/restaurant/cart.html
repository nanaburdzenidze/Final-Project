{% load static %}
<link rel="stylesheet" href="{%static 'restaurant/style.css' %}">
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name='viewport' content='device-width, initial-scale-1.0' >
        <title>Restaurant</title>
    </head>
    <body>
        <div class="top">
            <div>
                <p class="step">Step</p>
                <p class="ordering">Ordering</p>
            </div>
            <div>
                <p class=categories_label>Categories</p>
            </div>
            <div>
                <a href = '' class="home">
                    Home
                </a>
                <a href = '' class="cart">
                    Cart
                </a>
            </div>
            
        </div>

        <div> <!--  კონტეინერი რომელიც შეიცავს კალათაში არსებული პროდუქტების კონტეინერებს-->
            {% for product in products %}<!-- გადავუყვებით ყველა პროდუქტს რომელიც არის კალათაში და თითოეულს მოვათავსებთ თვაის კონტეინერში -->
                <div class = 'cart_item'>
                    <!-- თითოეული პროსუქტისთვის უნდა იყოს შემდეგი ელემენტები: 1) ღილაკი რომელიც მთლიანად წაშლის ამ პროდუქტს კალათიდან 2) სურათი 3) დასახელება 
                     +- ღილაკები, 5) რაოდენობა 6) ერთი ცალის ფასი და 7) შესაბამისი რაოდენობის ფასი-->

                     <!-- აქ არის 1) ღილაკი რომელიც წაშლის პროდუქტს მთლიანად კალათიდან-->
                     <form method = 'POST' action='update'>
                        <input type = 'hidden' name = 'product_id' value = "{{ product.id}}">
                        <input type = 'hidden' name = 'action' value = "remove">
                       <button type = "submit">X</button>
                     </form>
                     <!-- 2) პროდუქტის სურათი -->
                    <img src="{{ product.image }}" class='prod_img'>

                    <!-- 3) დასახელება-->
                      <p>{{ product.name }}</p>

                    <!-- 4) - ღილაკი-->
                    <form method = 'POST' action='update'>
                        <input type = 'hidden' name = 'product_id' value = "{{ product.id}}">
                        <input type = 'hidden' name = 'action' value = "reduce">
                       <button type = "submit">-</button>
                     </form>
                     <!-- 5) რაოდენობა -->
                    <p>{{ product.quantity }}</p>
                    <!-- 4) + ღილაკი-->
                     <form method = 'POST' action='update'>
                        <input type = 'hidden' name = 'product_id' value = "{{ product.id}}">
                        <input type = 'hidden' name = 'action' value = "add">
                       <button type = "submit">+</button>
                     </form>
                    <p>{{ product.price }}</p>
                </div>
            {%endfor%}
        </div>
    </body>
</html>
